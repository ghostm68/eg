<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dreamweaver // WordStar Nexus</title>
<!-- FontAwesome for the PDF icon in footer -->
<link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css'>

<style>
    /* === 1. EXACT DIRECTORY VARIABLES === */
    :root {
        --bg-color: #000000;
        --text-main: #E0E0E0;
        --text-dim: #666666;
        --accent-primary: #FF0000; /* Red */
        --accent-secondary: #550000; /* Dark Red */
        --font-main: 'Courier New', Courier, monospace;
    }

    /* WORDSTAR BLUE MODE */
    body.classic-mode {
        --bg-color: #0000AA;         /* Blue */
        --text-main: #FFFFFF;        /* White */
        --text-dim: #00FFFF;         /* Cyan */
        --accent-primary: #FFFF00;   /* Yellow */
        --accent-secondary: #AA5500; /* Amber */
    }

    ::selection {
        background: var(--accent-primary);
        color: var(--bg-color);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background-color: var(--bg-color);
        color: var(--text-main);
        font-family: var(--font-main);
        height: 100vh;
        width: 100vw;
        overflow: hidden; /* Desktop handles scroll internally */
        display: flex;
        flex-direction: column;
        transition: background-color 0.5s ease;
    }

    /* === 2. HEADER & LOGO === */
    header {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        height: 70px;
        border-bottom: 1px solid var(--accent-secondary);
        background: rgba(0,0,0,0.2);
    }

    .header-typing-wrapper {
        font-size: 1.2rem;
        font-weight: bold;
        color: var(--accent-primary);
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .ws-logo {
        height: 40px; width: auto;
        filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.5));
    }
    .logo-text path { fill: var(--text-main); transition: fill 0.5s; }
    .logo-x path { fill: var(--accent-primary); transition: 0.3s; }

    /* === 3. MAIN SPLIT LAYOUT === */
    .content-area {
        flex-grow: 1;
        display: flex;
        flex-direction: row;
        gap: 30px;
        padding: 20px;
        overflow: hidden; 
        height: calc(100vh - 110px); /* Adjust for header/footer */
    }

    /* --- SIDE A: TEXT PANE --- */
    .text-pane {
        flex: 1.2;
        display: flex;
        flex-direction: column;
        gap: 20px;
        height: 100%;
    }

    .nav-box {
        background: rgba(10, 10, 10, 0.85);
        border: 1px solid var(--text-dim);
        border-left: 3px solid var(--text-dim);
        color: var(--text-main);
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
    }
    body.classic-mode .nav-box { background: rgba(0, 0, 100, 0.85); }
    
    .nav-box.active { 
        border-color: var(--accent-primary); 
        border-left: 6px solid var(--accent-primary); 
    }

    .nav-header { 
        padding: 15px; 
        font-weight: bold; 
        color: var(--accent-primary);
        border-bottom: 1px solid var(--accent-secondary);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .nav-content {
        padding: 15px; 
        font-size: 0.95rem; 
        color: var(--text-main);
        line-height: 1.6;
    }

    /* Scrollable Text Log */
    .scroll-box {
        flex-grow: 1;
        overflow-y: auto;
        white-space: pre-wrap; /* Keeps formatting pure */
    }
    
    .scroll-box::-webkit-scrollbar { width: 5px; }
    .scroll-box::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
    .scroll-box::-webkit-scrollbar-thumb { background: var(--accent-primary); }

    /* --- SIDE B: TRIANGLE IMAGE GRID --- */
    .visual-pane {
        flex: 2;
        height: 100%;
        overflow-y: auto;
        padding-right: 15px;
    }
    .visual-pane::-webkit-scrollbar { width: 5px; }
    .visual-pane::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
    .visual-pane::-webkit-scrollbar-thumb { background: var(--accent-primary); }

    .triangle-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 20px;
        padding-bottom: 40px;
    }

    .triangle-wrapper {
        position: relative;
        width: 100%;
        aspect-ratio: 1.15;
        display: flex; justify-content: center; align-items: center;
    }

    .triangle-border {
        position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
        background: var(--accent-primary);
        clip-path: polygon(0 0, 100% 0, 50% 100%);
        z-index: 1; opacity: 0.8;
        transition: background 0.5s;
    }

    .triangle-shape {
        width: 100%; height: 100%;
        clip-path: polygon(0 0, 100% 0, 50% 100%);
        background: #000;
        position: relative; z-index: 2;
    }

    /* Make alternating triangles point UP */
    .triangle-wrapper.up-triangle .triangle-border { clip-path: polygon(50% 0, 100% 100%, 0 100%); }
    .triangle-wrapper.up-triangle .triangle-shape { clip-path: polygon(50% 0, 100% 100%, 0 100%); }

    .triangle-shape img {
        width: 100%; height: 100%;
        object-fit: cover;
        opacity: 0.6;
        filter: grayscale(100%) contrast(1.2);
        transition: all 0.3s ease;
    }
    .triangle-shape img:hover {
        opacity: 1;
        filter: grayscale(0%) contrast(1);
        transform: scale(1.05);
    }

    /* === 4. STATUS FOOTER === */
    .status-footer {
        border-top: 1px solid var(--text-dim);
        background: var(--bg-color); 
        color: var(--text-dim);
        padding: 10px 20px; 
        font-size: 0.8rem;
        display: flex; justify-content: space-between;
        transition: background-color 0.5s;
        z-index: 50;
    }
    .status-footer a { color: var(--accent-primary); text-decoration: none; font-size: 1rem; }
    .status-footer a:hover { color: var(--text-main); }

    /* === 5. DRAWER === */
    .drawer-toggle-btn {
        position: fixed;
        bottom: 60px; /* Sits right above the footer */
        right: 20px;
        background: var(--bg-color);
        color: var(--text-main);
        border: 1px solid var(--accent-primary);
        padding: 10px 20px;
        font-family: inherit;
        font-weight: bold;
        cursor: pointer;
        z-index: 999;
        transition: all 0.2s;
        box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }
    .drawer-toggle-btn:hover { background: var(--accent-primary); color: var(--bg-color); }

    .reader-drawer {
        position: fixed; top: 0; right: -100%;
        width: 500px; max-width: 100vw; height: 100vh;
        background: var(--bg-color);
        border-left: 1px solid var(--accent-primary);
        transition: right 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        z-index: 1000;
        display: flex; flex-direction: column;
    }
    .reader-drawer.open { right: 0; }
    .drawer-header {
        display: flex; justify-content: space-between; align-items: center;
        padding: 15px; background: var(--bg-color);
        border-bottom: 1px solid var(--accent-secondary);
        color: var(--accent-primary); font-weight: bold;
    }
    .close-drawer-btn { background: none; color: var(--text-main); border: none; cursor: pointer; font-family: inherit; font-size: 1.2rem; }
    .close-drawer-btn:hover { color: var(--accent-primary); }
    .reader-iframe { flex-grow: 1; width: 100%; border: none; background: #000; }

    /* Mobile */
    @media (max-width: 900px) {
        .content-area { flex-direction: column; overflow-y: auto; }
        .text-pane { height: 60vh; flex: none; }
        .visual-pane { height: auto; overflow: visible; padding-bottom: 80px; }
        body { overflow-y: auto; }
    }
</style>
</head>
<body>

    <!-- HEADER (Identical aesthetic to directory.html) -->
    <header>
        <div class="header-typing-wrapper" id="header-type-target"></div>
        <svg class="ws-logo" viewBox="0 0 600 90" xmlns="http://www.w3.org/2000/svg">

        </svg>
    </header>

    <div class="content-area">
        
        <!-- LEFT: TEXT FEED & THEME SWITCH -->
        <div class="text-pane">
            
            <!-- THE TOGGLE SWITCH -->
            <div class="nav-box active" onclick="toggleTheme()" style="cursor: pointer; flex: none;">
                <div class="nav-header">SYSTEM_STATUS [SWITCH]</div>
                <div class="nav-content" style="padding-bottom: 20px;">
                    CLICK BOX TO TOGGLE VISUAL THEME.<br>
                    CURRENT: <span id="theme-name" style="color: var(--accent-primary);">CITADELLE_RED</span>
                </div>
            </div>

            <!-- THE RAW TEXT FETCHER -->
            <div class="nav-box active" style="flex-grow: 1; display: flex; overflow: hidden;">
                <div class="nav-header" style="cursor: default;">
                    >> DREAMWEAVER_ARCHIVE.TXT
                    <a href="https://wordstar.nexus/dreamweaver.txt" target="_blank" style="color: var(--text-dim); text-decoration: none; font-size: 0.8rem;">[ RAW ]</a>
                </div>
                <!-- The JS Fetch will dump the text directly here -->
                <div class="nav-content scroll-box" id="dreamweaver-text-container">
                    INITIALIZING FETCH PROTOCOL...
                </div>
            </div>

        </div>

        <!-- RIGHT: TRIANGLE IMAGE GRID -->
        <div class="visual-pane">
            <div id="image-gallery" class="triangle-grid"></div>
        </div>

    </div>

    <!-- FOOTER (Identical to directory.html) -->
    <div class="status-footer">
        <span>DRIVE A: READY</span>
        <span>MODE: OVERTYPE</span>
        <span> "quiet, piggy!" -an inky-kid book, AVAILABLE NOW 
           <a href="https://github.com/ghostm68/pantheon/raw/main/Quiet_Piggy_a%20wordstar%20child's%20book.pdf" target="_blank">  
               <i class='fa fa-file-pdf-o' style="margin-left:5px;"></i>
           </a>
        </span> 
    </div>

    <!-- FLOATING BUTTON TO OPEN R3ADER -->
    <button id="open-drawer-btn" class="drawer-toggle-btn">[ ACCESS R3ADER ]</button>

    <!-- SLIDE OUT DRAWER -->
    <div id="drawer" class="reader-drawer">
        <div class="drawer-header">
            <span>// R3ADER_PORTAL</span>
            <button id="close-drawer-btn" class="close-drawer-btn">[ X ]</button>
        </div>
        <iframe src="https://wordstar.nexus/reader" class="reader-iframe" title="R3ader"></iframe>
    </div>

    <!-- JAVASCRIPT: LOGIC & ARCHITECTURE -->
    <script>
        // 1. TYPING HEADER
        const textToType = "DREAMWEAVER // TERMINAL";
        const typingTarget = document.getElementById('header-type-target');
        let typeIndex = 0;
        
        function typeHeader() {
            if (typeIndex < textToType.length) {
                typingTarget.innerHTML += textToType.charAt(typeIndex);
                typeIndex++;
                setTimeout(typeHeader, 50);
            }
        }
        setTimeout(typeHeader, 300);

        // 2. THEME SWITCHER
        function toggleTheme() {
            document.body.classList.toggle('classic-mode');
            const themeLabel = document.getElementById('theme-name');
            if (document.body.classList.contains('classic-mode')) {
                if (themeLabel) themeLabel.innerText = "WORDSTAR_BLUE";
            } else {
                if (themeLabel) themeLabel.innerText = "CITADELLE_RED";
            }
        }

        // 3. FETCH THE DREAMWEAVER.TXT AUTOMATICALLY
        const textContainer = document.getElementById('dreamweaver-text-container');
        fetch('https://wordstar.nexus/dreamweaver.txt')
            .then(response => {
                if (!response.ok) throw new Error("NETWORK_RESPONSE_ERROR");
                return response.text();
            })
            .then(data => {
                textContainer.textContent = data; 
            })
            .catch(error => {
                textContainer.textContent = "SYSTEM_ERROR: UNABLE TO ESTABLISH LINK.\n\n" + error;
            });

        // 4. GENERATE THE ALTERNATING TRIANGLE IMAGE GRID
        const imageUrls =[
            'https://github.com/ghostm68/pantheon/raw/main/vasilisa.wordstar.nexus.gif',
            'https://github.com/ghostm68/pantheon/raw/main/VAPORGRAM176lotta48724ever64233.jpg',
            'https://github.com/ghostm68/pantheon/raw/main/Kristina.wordstar.gif',
            'https://github.com/ghostm68/pantheon/raw/main/H.wordstardream.gif',
            'https://github.com/ghostm68/pantheon/raw/main/dgagz.gif',
            'https://github.com/ghostm68/pantheon/raw/main/juliamecey5beee1f88167a9e.gif',
            'https://github.com/ghostm68/pantheon/raw/main/sierra1744829382462.gif',
            'https://github.com/ghostm68/pantheon/raw/main/membershipkcardtexas.jpg',
            'https://github.com/ghostm68/pantheon/raw/main/indiaeisley.gif',
            'https://github.com/ghostm68/pantheon/raw/main/rachelchaleff22625.jpg',
            'https://github.com/ghostm68/pantheon/raw/main/liblot20251204_141923127.jpg',
            'https://github.com/ghostm68/pantheon/raw/main/zelda.gif',
            'https://github.com/ghostm68/pantheon/raw/main/laracosima.wordstar.gif',  
            'https://github.com/ghostm68/pantheon/raw/main/wagners.wordstar.jpg',
            'https://github.com/ghostm68/pantheon/raw/main/laurasophie.h.gif',  
            'https://github.com/ghostm68/pantheon/raw/main/myrnaloy.wordstar.gif',
            'https://github.com/ghostm68/pantheon/raw/main/barbarastanwyck.0045723a2d04a.gif',  
            'https://github.com/ghostm68/pantheon/raw/main/bf.theroadtowellville.gif',
            'https://github.com/ghostm68/pantheon/raw/main/deepelemblues.twoskinnygirls.gif',
            'https://github.com/ghostm68/pantheon/raw/main/VAPORGRAM.wildfiremap1736434961088.gif',
            'https://github.com/ghostm68/pantheon/raw/main/Detroit.jpeg',
            'https://raw.githubusercontent.com/ghostm68/99/main/5379e792-a434-4666-8e51-bb8e41de678b_inky_gif.gif',
            'https://github.com/ghostm68/pantheon/raw/main/robyn.jpeg',
            'https://github.com/ghostm68/pantheon/raw/main/gg.gif',
            'https://github.com/ghostm68/pantheon/raw/main/woody.jpeg',
            'https://github.com/ghostm68/pantheon/raw/main/demi.jpeg',  
            'https://github.com/ghostm68/pantheon/raw/main/lotta.jpeg',
            'https://github.com/ghostm68/pantheon/raw/main/inka.jpeg',
            'https://github.com/ghostm68/pantheon/raw/main/selena.jpeg',
            'https://github.com/ghostm68/pantheon/raw/main/paula.jpeg',
            'https://github.com/ghostm68/pantheon/raw/main/Margaret.jpeg',
            'https://github.com/ghostm68/pantheon/raw/main/misfits.jpg',
            'https://github.com/ghostm68/pantheon/raw/main/haunting-of-hill-house_.jpeg',
            'https://github.com/ghostm68/pantheon/raw/main/angelina.jpeg',
            'https://github.com/ghostm68/pantheon/raw/main/jennifer.jpg',
            'https://github.com/ghostm68/pantheon/raw/main/White-Goddess.jpg'
        ];

        const galleryContainer = document.getElementById('image-gallery');
        
        imageUrls.forEach((url, index) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'triangle-wrapper';
            
            // Alternates triangles up and down for the esoteric pantheon aesthetic
            if (index % 2 !== 0) {
                wrapper.classList.add('up-triangle');
            }

            wrapper.innerHTML = `
                <div class="triangle-border"></div>
                <div class="triangle-shape">
                    <img src="${url}" alt="Archive File ${index + 1}">
                </div>
            `;
            galleryContainer.appendChild(wrapper);
        });

        // 5. DRAWER TOGGLE LOGIC
        const drawer = document.getElementById('drawer');
        const openBtn = document.getElementById('open-drawer-btn');
        const closeBtn = document.getElementById('close-drawer-btn');

        openBtn.addEventListener('click', () => drawer.classList.add('open'));
        closeBtn.addEventListener('click', () => drawer.classList.remove('open'));

        document.addEventListener('click', (event) => {
            if (!drawer.contains(event.target) && event.target !== openBtn) {
                drawer.classList.remove('open');
            }
        });
    </script>
</body>
</html>
