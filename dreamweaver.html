<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dreamweaver // WordStar Nexus</title>
<style>
    /* =========================================
       BASE & TERMINAL AESTHETIC (DIRECTORY STYLE)
       ========================================= */
    body {
        margin: 0;
        padding: 0;
        background-color: #000;
        color: #fff;
        font-family: 'Courier New', Courier, monospace; 
        overflow-x: hidden;
    }

    a { color: #fff; text-decoration: none; transition: color 0.2s; }
    a:hover { color: #ff0000; text-decoration: underline; }

    /* Custom Terminal Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #000; border-left: 1px solid #333; }
    ::-webkit-scrollbar-thumb { background: #333; }
    ::-webkit-scrollbar-thumb:hover { background: #ff0000; }

    /* =========================================
       HEADER & TYPING EFFECT
       ========================================= */
    .nexus-header {
        padding: 1.5rem 2rem;
        border-bottom: 1px solid #333;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #050505;
    }
    .nexus-header:hover { border-bottom-color: #ff0000; }
    
    #header-typing-target {
        font-weight: bold;
        color: #ff0000;
        letter-spacing: 1px;
    }

    /* =========================================
       MAIN SPLIT LAYOUT
       ========================================= */
    .nexus-container {
        display: flex;
        height: calc(100vh - 75px); /* Full height minus header */
        box-sizing: border-box;
    }

    /* LEFT SIDE: DIRECTORY IMAGE GRID */
    .visual-pane {
        flex: 1;
        min-width: 300px;
        max-width: 500px;
        border-right: 1px solid #333;
        overflow-y: auto;
        padding: 1rem;
        background: #020202;
        transition: border-color 0.3s;
    }
    .visual-pane:hover { border-right-color: #ff0000; }

    .image-grid {
        display: grid;
        grid-template-columns: 1fr 1fr; /* 2-Column Grid instead of Triangle */
        gap: 10px;
    }

    .image-grid img {
        width: 100%;
        height: auto;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        border: 1px solid #333;
        transition: all 0.2s ease-in-out;
        opacity: 0.8;
    }
    .image-grid img:hover {
        border-color: #ff0000;
        opacity: 1;
        transform: scale(1.02);
        z-index: 10;
    }

    /* RIGHT SIDE: LIVE .TXT FILE PULL */
    .text-pane {
        flex: 2;
        overflow-y: auto;
        padding: 2rem;
        background: #000;
    }

    .nav-box {
        border: 1px solid #333;
        background: #050505;
        padding: 2rem;
        transition: all 0.3s;
    }
    .nav-box:hover {
        border-color: #ff0000;
        box-shadow: 0 0 15px rgba(255, 0, 0, 0.1);
    }

    .nav-header {
        margin-top: 0;
        color: #ff0000;
        border-bottom: 1px dashed #333;
        padding-bottom: 10px;
        font-size: 1.1rem;
        text-transform: uppercase;
    }

    #dreamweaver-text-container {
        color: #ccc;
        line-height: 1.6;
        white-space: pre-wrap; /* Formats raw .txt perfectly */
        font-size: 0.95rem;
    }

    /* =========================================
       DRAWER COMPONENT (R3ADER PULL-OUT)
       ========================================= */
    .drawer-toggle-btn {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        background: #000;
        color: #fff;
        border: 1px solid #333;
        padding: 10px 20px;
        font-family: inherit;
        font-weight: bold;
        cursor: pointer;
        z-index: 999;
        transition: all 0.2s;
        text-transform: uppercase;
    }
    .drawer-toggle-btn:hover {
        background: #ff0000;
        color: #000;
        border-color: #ff0000;
    }

    .reader-drawer {
        position: fixed;
        top: 0;
        right: -100%;
        width: 500px;
        max-width: 100vw;
        height: 100vh;
        background: #000;
        border-left: 1px solid #ff0000;
        transition: right 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        z-index: 1000;
        display: flex;
        flex-direction: column;
    }
    .reader-drawer.open { right: 0; }

    .drawer-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem;
        background: #050505;
        border-bottom: 1px solid #333;
        color: #ff0000;
        font-weight: bold;
    }

    .close-drawer-btn {
        background: none;
        color: #fff;
        border: 1px solid #333;
        cursor: pointer;
        font-family: inherit;
        padding: 5px 10px;
    }
    .close-drawer-btn:hover { background: #ff0000; color: #000; border-color: #ff0000; }
    .reader-iframe { flex-grow: 1; width: 100%; border: none; background: #000; }

    @media (max-width: 900px) {
        .nexus-container { flex-direction: column; height: auto; }
        .visual-pane { max-width: 100%; height: 40vh; border-right: none; border-bottom: 1px solid #333; }
    }
</style>
</head>
<body>

    <!-- DIRECTORY HEADER -->
    <div class="nexus-header">
        <span id="header-typing-target"></span>
        <a href="https://wordstar.nexus/dreamweaver.txt" target="_blank">[ RAW_ACCESS ]</a>
    </div>

    <div class="nexus-container">
        <!-- LEFT: IMAGE DIRECTORY GRID (All Images Visible) -->
        <div class="visual-pane">
            <div id="image-gallery" class="image-grid"></div>
        </div>

        <!-- RIGHT: LIVE TXT FILE FEED -->
        <div class="text-pane">
            <div class="nav-box">
                <h3 class="nav-header">>> DREAMWEAVER_ARCHIVE.TXT // SYSTEM_ONLINE</h3>
                <!-- The JS Fetch will dump the text file directly into this container -->
                <div id="dreamweaver-text-container">INITIALIZING FETCH PROTOCOL...</div>
            </div>
        </div>
    </div>

    <!-- FLOATING BUTTON TO OPEN R3ADER -->
    <button id="open-drawer-btn" class="drawer-toggle-btn">[ ACCESS R3ADER ]</button>

    <!-- SLIDE OUT DRAWER -->
    <div id="drawer" class="reader-drawer">
        <div class="drawer-header">
            <span>// R3ADER_PORTAL</span>
            <button id="close-drawer-btn" class="close-drawer-btn">[ X ]</button>
        </div>
        <iframe src="https://wordstar.nexus/reader" class="reader-iframe" title="R3ader"></iframe>
    </div>

    <!-- JAVASCRIPT: LOGIC & ARCHITECTURE -->
    <script>
        // 1. TYPING EFFECT (Matching wordstar.nexus/directory)
        const textToType = "DREAMWEAVER_ARCHIVE_ONLINE...";
        const typingTarget = document.getElementById('header-typing-target');
        let typeIndex = 0;
        
        function typeHeader() {
            if (typeIndex < textToType.length) {
                typingTarget.innerHTML += textToType.charAt(typeIndex);
                typeIndex++;
                setTimeout(typeHeader, 50);
            }
        }
        setTimeout(typeHeader, 300); // Start slightly after page load

        // 2. FETCH THE DREAMWEAVER.TXT FILE AUTOMATICALLY
        const textContainer = document.getElementById('dreamweaver-text-container');
        
        fetch('https://wordstar.nexus/dreamweaver.txt')
            .then(response => {
                if (!response.ok) throw new Error("NETWORK_RESPONSE_ERROR");
                return response.text();
            })
            .then(data => {
                textContainer.textContent = data; // Dumps raw text formatting perfectly
            })
            .catch(error => {
                textContainer.textContent = "SYSTEM_ERROR: UNABLE TO ESTABLISH LINK WITH DREAMWEAVER.TXT\n\n" + error;
                textContainer.style.color = "#ff0000";
            });

        // 3. GENERATE THE IMAGE GRID
        const imageUrls =[
            'https://github.com/ghostm68/pantheon/raw/main/vasilisa.wordstar.nexus.gif',
            'https://github.com/ghostm68/pantheon/raw/main/VAPORGRAM176lotta48724ever64233.jpg',
            'https://github.com/ghostm68/pantheon/raw/main/Kristina.wordstar.gif',
            'https://github.com/ghostm68/pantheon/raw/main/H.wordstardream.gif',
            'https://github.com/ghostm68/pantheon/raw/main/dgagz.gif',
            'https://github.com/ghostm68/pantheon/raw/main/juliamecey5beee1f88167a9e.gif',
            'https://github.com/ghostm68/pantheon/raw/main/sierra1744829382462.gif',
            'https://github.com/ghostm68/pantheon/raw/main/membershipkcardtexas.jpg',
            'https://github.com/ghostm68/pantheon/raw/main/indiaeisley.gif',
            'https://github.com/ghostm68/pantheon/raw/main/rachelchaleff22625.jpg',
            'https://github.com/ghostm68/pantheon/raw/main/liblot20251204_141923127.jpg',
            'https://github.com/ghostm68/pantheon/raw/main/zelda.gif',
            'https://github.com/ghostm68/pantheon/raw/main/laracosima.wordstar.gif',  
            'https://github.com/ghostm68/pantheon/raw/main/wagners.wordstar.jpg',
            'https://github.com/ghostm68/pantheon/raw/main/laurasophie.h.gif',  
            'https://github.com/ghostm68/pantheon/raw/main/myrnaloy.wordstar.gif',
            'https://github.com/ghostm68/pantheon/raw/main/barbarastanwyck.0045723a2d04a.gif',  
            'https://github.com/ghostm68/pantheon/raw/main/bf.theroadtowellville.gif',
            'https://github.com/ghostm68/pantheon/raw/main/deepelemblues.twoskinnygirls.gif',
            'https://github.com/ghostm68/pantheon/raw/main/VAPORGRAM.wildfiremap1736434961088.gif',
            'https://github.com/ghostm68/pantheon/raw/main/Detroit.jpeg',
            'https://raw.githubusercontent.com/ghostm68/99/main/5379e792-a434-4666-8e51-bb8e41de678b_inky_gif.gif',
            'https://github.com/ghostm68/pantheon/raw/main/robyn.jpeg',
            'https://github.com/ghostm68/pantheon/raw/main/gg.gif',
            'https://github.com/ghostm68/pantheon/raw/main/woody.jpeg',
            'https://github.com/ghostm68/pantheon/raw/main/demi.jpeg',  
            'https://github.com/ghostm68/pantheon/raw/main/lotta.jpeg',
            'https://github.com/ghostm68/pantheon/raw/main/inka.jpeg',
            'https://github.com/ghostm68/pantheon/raw/main/selena.jpeg',
            'https://github.com/ghostm68/pantheon/raw/main/paula.jpeg',
            'https://github.com/ghostm68/pantheon/raw/main/Margaret.jpeg',
            'https://github.com/ghostm68/pantheon/raw/main/misfits.jpg',
            'https://github.com/ghostm68/pantheon/raw/main/haunting-of-hill-house_.jpeg',
            'https://github.com/ghostm68/pantheon/raw/main/angelina.jpeg',
            'https://github.com/ghostm68/pantheon/raw/main/jennifer.jpg',
            'https://github.com/ghostm68/pantheon/raw/main/White-Goddess.jpg'
        ];

        const galleryContainer = document.getElementById('image-gallery');
        imageUrls.forEach((url, index) => {
            const img = document.createElement('img');
            img.src = url;
            img.alt = `Archive Image ${index + 1}`;
            galleryContainer.appendChild(img);
        });

        // 4. DRAWER TOGGLE LOGIC
        const drawer = document.getElementById('drawer');
        const openBtn = document.getElementById('open-drawer-btn');
        const closeBtn = document.getElementById('close-drawer-btn');

        openBtn.addEventListener('click', () => drawer.classList.add('open'));
        closeBtn.addEventListener('click', () => drawer.classList.remove('open'));

        document.addEventListener('click', (event) => {
            if (!drawer.contains(event.target) && event.target !== openBtn) {
                drawer.classList.remove('open');
            }
        });
    </script>
</body>
</html>
