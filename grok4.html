<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Playground</title>
    <style>
        /* === DEFINE VARIABLES FIRST === */
        :root {
            --red: #ff0033;
            --black: #0a0a0a;
        }

        /* === NOW selection can use them === */
        ::selection {
            background: var(--red);
            color: var(--black);
            text-shadow: none;
        }
    </style>
    <style>
        body {
            background: #0a0a0a;
            color: #f0f0f0;
            font-family: 'Georgia', serif;
            margin: 0;
            padding: 0.8rem;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.6rem;
            max-width: 1800px;
            margin: 0 auto;
            min-height: 85vh;
        }
        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 1fr;
                gap: 0.6rem;
            }
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.3rem;
            text-align: center;
        }
        .subtitle {
            font-style: italic;
            color: #aaa;
            margin-bottom: 0.8rem;
            text-align: center;
            font-size: 0.85rem;
        }
        
        .panel {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 0.8rem;
            display: flex;
            flex-direction: column;
        }
        .panel h2 {
            margin-top: 0;
            font-size: 1.1rem;
            color: #eee;
            border-bottom: 1px solid #333;
            padding-bottom: 0.4rem;
            margin-bottom: 0.6rem;
        }
        
        /* Chat History Panel */
        #chat-section {
            min-height: 450px;
        }
        .chat-display {
            flex: 1;
            background: #0a0a0a;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 0.8rem;
            overflow-y: auto;
            min-height: 320px;
            line-height: 1.4;
            font-size: 0.85rem;
        }
        .message {
            margin-bottom: 0.8rem;
            padding: 0.5rem;
            border-radius: 4px;
        }
        .user-message {
            background: #1a3a1a;
            border-left: 3px solid #4a7c4a;
        }
        .assistant-message {
            background: #1a1a2a;
            border-left: 3px solid #4a4a7c;
        }
        .message-role {
            font-weight: bold;
            font-size: 0.75rem;
            margin-bottom: 0.3rem;
            opacity: 0.7;
        }
        .chat-controls {
            margin-top: 0.6rem;
            display: flex;
            gap: 0.4rem;
        }
        .chat-controls button {
            flex: 1;
            padding: 0.4rem;
            font-size: 0.75rem;
        }
        
        /* AI Controls Panel */
        #ai-controls {
            min-height: 450px;
        }
        .api-key-section {
            background: #0a0a0a;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 0.6rem;
            margin-bottom: 0.6rem;
        }
        .api-key-section h3 {
            margin-top: 0;
            font-size: 0.85rem;
            color: #eee;
        }
        .key-input-group {
            display: flex;
            gap: 0.3rem;
            margin-bottom: 0.2rem;
        }
        #apiKey {
            flex: 1;
            padding: 0.3rem;
            background: #1a1a1a;
            color: #eee;
            border: 1px solid #444;
            border-radius: 4px;
            font-size: 0.75rem;
        }
        .toggle-key {
            padding: 0.3rem 0.6rem;
            font-size: 0.7rem;
        }
        .api-help {
            font-size: 0.65rem;
            color: #666;
        }

        /* Model Selector Styling */
        .model-select-section {
            background: #0a0a0a;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 0.6rem;
            margin-bottom: 0.6rem;
        }
        .model-select-section h3 {
            margin-top: 0;
            font-size: 0.85rem;
            color: #eee;
            margin-bottom: 0.4rem;
        }
        #modelSelect {
            width: 100%;
            padding: 0.4rem;
            background: #1a1a1a;
            color: #eee;
            border: 1px solid #444;
            border-radius: 4px;
            font-size: 0.75rem;
            font-family: 'Georgia', serif;
            cursor: pointer;
        }

        .prompt-section {
            margin-bottom: 0.6rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .prompt-section label {
            display: block;
            margin-bottom: 0.2rem;
            color: #aaa;
            font-size: 0.75rem;
        }
        #userInput {
            width: 100%;
            flex: 1;
            min-height: 120px;
            background: #0a0a0a;
            color: #f0f0f0;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 0.5rem;
            font-size: 0.8rem;
            line-height: 1.3;
            resize: vertical;
            font-family: inherit;
        }
        .send-section {
            margin-top: 0.6rem;
        }
        #sendButton {
            width: 100%;
            padding: 0.5rem;
            font-size: 0.85rem;
        }
        
        /* Status Panel */
        #status-section {
            min-height: 450px;
        }
        .status-display {
            flex: 1;
            background: #0a0a0a;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 0.8rem;
            white-space: pre-wrap;
            line-height: 1.4;
            font-size: 0.85rem;
            overflow-y: auto;
            min-height: 320px;
            color: #aaa;
        }
        .status-ok {
            color: #4a7c4a;
        }
        .status-error {
            color: #7c4a4a;
        }
        
        button {
            background: transparent;
            color: #eee;
            border: 1px solid #555;
            cursor: pointer;
            font-family: 'Georgia', serif;
            transition: all 0.3s ease;
        }
        button:hover {
            background: #222;
            border-color: #777;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .api-status {
            margin-top: 0.8rem;
            font-size: 0.75rem;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1 id="mainHeader">🚀 GROK 4.1 FAST</h1>
    <p class="subtitle" id="subHeader">Free testing via OpenRouter  • Bring Your Own Key</p>

    <div class="container">
        <!-- Column 1: Chat History -->
        <div id="chat-section" class="panel">
            <h2>Conversation</h2>
            
            <div class="chat-display" id="chatDisplay">
                <!-- Welcome message is populated dynamically by JS on load -->
            </div>

            <div class="chat-controls">
                <button id="clearChat">Clear Chat</button>
                <button id="exportChat">Export TXT</button>
            </div>
        </div>

        <!-- Column 2: AI Controls -->
        <div id="ai-controls" class="panel">
            <h2>Controls</h2>
            
            <div class="api-key-section">
                <h3>OpenRouter API Key:</h3>
                <div class="key-input-group">
                    <input type="password" id="apiKey" placeholder="sk-or-v1-...">
                    <button class="toggle-key" id="toggleKey">👁️</button>
                </div>
                <div class="api-help">
                    Get free key at: <a href="https://openrouter.ai/settings/keys" target="_blank" style="color: #4a7c7c;">openrouter.ai/settings/keys</a>
                </div>
            </div>

            <!-- Model Selection Dropdown -->
            <div class="model-select-section">
                <h3>Select Model:</h3>
                <select id="modelSelect">
                    <option value="x-ai/grok-4.1-fast">Grok 4.1 Fast (xAI)</option>
                    <option value="cognitivecomputations/dolphin-mistral-24b-venice-edition:free">Venice Free (Dolphin Mistral 24B)</option>
                </select>
            </div>

            <div class="prompt-section">
                <label for="userInput">Your Message:</label>
                <textarea id="userInput" placeholder="Type your message here..."></textarea>
            </div>

            <div class="send-section">
                <button id="sendButton">Send Message</button>
            </div>
        </div>

        <!-- Column 3: Status -->
        <div id="status-section" class="panel">
            <h2>Status</h2>
            <div class="status-display" id="statusDisplay">
                <!-- Status details populated dynamically by JS on load -->
            </div>
        </div>
    </div>

    <div class="api-status" id="footerText">
        Powered by OpenRouter • No credit card required for free models
    </div>

    <script>
        let apiKey = '';
        let conversationHistory = [];
        let currentModel = 'x-ai/grok-4.1-fast'; // Default model

        // Configuration details for each model
        const modelConfigs = {
            'x-ai/grok-4.1-fast': {
                name: 'Grok 4.1 Fast',
                header: '🚀 GROK 4.1 FAST',
                subtitle: 'Free testing via OpenRouter  •  Bring Your Own Key',
                roleLabel: 'GROK',
                welcomeMessage: "Hello! I'm Grok 4.1 Fast. Enter your OpenRouter API key in the middle panel to start chatting.",
                defaultStatus: `Ready to connect.\n\nEnter your OpenRouter API key and start chatting with Grok 4.1 Fast.\n\n⚡ High performance agentic assistant\n🔒 Your key stays in your browser\n💬 Full conversation history maintained`,
                footerText: 'Powered by xAI Grok via OpenRouter • No credit card required for free models'
            },
            'cognitivecomputations/dolphin-mistral-24b-venice-edition:free': {
                name: 'Venice Free',
                header: '🎭 VENICE UNCENSORED FREE',
                subtitle: 'Uncensored & private testing via OpenRouter  •  Bring Your Own Key',
                roleLabel: 'VENICE',
                welcomeMessage: "Hello! I'm Dolphin Mistral 24B Venice Edition. Enter your OpenRouter API key in the middle panel to start an uncensored, private conversation.",
                defaultStatus: `Ready to connect.\n\nEnter your OpenRouter API key and start chatting with Venice Free.\n\n🔓 Uncensored and unrestricted\n🔒 Your key stays in your browser\n💬 Full conversation history maintained`,
                footerText: 'Powered by Venice.ai via OpenRouter • No credit card required for free models'
            }
        };

        // Load saved API key and model selection
        window.addEventListener('load', () => {
            const savedKey = localStorage.getItem('openrouter_api_key');
            if (savedKey) {
                apiKey = savedKey;
                document.getElementById('apiKey').value = savedKey;
                updateStatus('API key loaded from storage', 'ok');
            }

            const savedModel = localStorage.getItem('openrouter_active_model');
            if (savedModel && modelConfigs[savedModel]) {
                currentModel = savedModel;
                document.getElementById('modelSelect').value = savedModel;
            }
            
            updateModelUI(true); // Initial UI render
        });

        // Toggle key visibility
        document.getElementById('toggleKey').addEventListener('click', () => {
            const input = document.getElementById('apiKey');
            input.type = input.type === 'password' ? 'text' : 'password';
        });

        // Save key on change
        document.getElementById('apiKey').addEventListener('change', (e) => {
            const key = e.target.value.trim();
            if (key) {
                apiKey = key;
                localStorage.setItem('openrouter_api_key', key);
                updateStatus('API key saved', 'ok');
            }
        });

        // Handle Model Selection change
        document.getElementById('modelSelect').addEventListener('change', (e) => {
            currentModel = e.target.value;
            localStorage.setItem('openrouter_active_model', currentModel);
            updateModelUI(false);
        });

        // Dynamic UI Updater
        function updateModelUI(isInit = false) {
            const config = modelConfigs[currentModel];
            
            document.getElementById('mainHeader').innerHTML = config.header;
            document.getElementById('subHeader').textContent = config.subtitle;
            document.getElementById('footerText').textContent = config.footerText;
            
            // Only update welcome chat/status pane if conversation has not yet started
            if (conversationHistory.length === 0) {
                const chatDisplay = document.getElementById('chatDisplay');
                chatDisplay.innerHTML = `
                    <div class="message assistant-message">
                        <div class="message-role">${config.roleLabel}</div>
                        ${config.welcomeMessage}
                    </div>
                `;
                document.getElementById('statusDisplay').textContent = config.defaultStatus;
            }
            
            if (!isInit) {
                updateStatus(`Switched active model to: ${config.name}`, 'info');
            }
        }

        function updateStatus(message, type = 'info') {
            const status = document.getElementById('statusDisplay');
            const timestamp = new Date().toLocaleTimeString();
            const prefix = type === 'ok' ? '✓' : type === 'error' ? '✗' : 'ℹ';
            status.textContent = `[${timestamp}] ${prefix} ${message}\n\n${status.textContent}`;
            status.className = `status-display ${type === 'ok' ? 'status-ok' : type === 'error' ? 'status-error' : ''}`;
        }

        function addMessage(role, content) {
            const chat = document.getElementById('chatDisplay');
            const div = document.createElement('div');
            div.className = `message ${role === 'user' ? 'user-message' : 'assistant-message'}`;
            
            const roleDiv = document.createElement('div');
            roleDiv.className = 'message-role';
            roleDiv.textContent = role === 'user' ? 'YOU' : modelConfigs[currentModel].roleLabel;
            
            const contentDiv = document.createElement('div');
            contentDiv.textContent = content;
            
            div.appendChild(roleDiv);
            div.appendChild(contentDiv);
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function sendMessage() {
            if (!apiKey) {
                updateStatus('Please enter and save your API key first', 'error');
                return;
            }

            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message) {
                updateStatus('Please enter a message', 'error');
                return;
            }

            addMessage('user', message);
            conversationHistory.push({ role: 'user', content: message });
            input.value = '';

            const sendBtn = document.getElementById('sendButton');
            sendBtn.disabled = true;
            sendBtn.textContent = 'Thinking...';
            updateStatus(`Waiting for ${modelConfigs[currentModel].name} response...`);

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`,
                        'HTTP-Referer': window.location.href,
                        'X-Title': 'Playground App'
                    },
                    body: JSON.stringify({
                        model: currentModel,
                        messages: conversationHistory
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || `HTTP ${response.status}`);
                }

                const data = await response.json();
                const reply = data.choices[0].message.content;
                
                addMessage('assistant', reply);
                conversationHistory.push({ role: 'assistant', content: reply });
                updateStatus('Response received', 'ok');
                
            } catch (error) {
                updateStatus(`Error: ${error.message}`, 'error');
                addMessage('assistant', `❌ Error: ${error.message}`);
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send Message';
            }
        }

        document.getElementById('sendButton').addEventListener('click', sendMessage);

        document.getElementById('userInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        document.getElementById('clearChat').addEventListener('click', () => {
            if (confirm('Clear conversation history?')) {
                conversationHistory = [];
                const chat = document.getElementById('chatDisplay');
                chat.innerHTML = '';
                updateModelUI(true);
                updateStatus('Chat history cleared', 'ok');
            }
        });

        document.getElementById('exportChat').addEventListener('click', () => {
            if (conversationHistory.length === 0) {
                updateStatus('No conversation to export', 'error');
                return;
            }
            
            const content = conversationHistory
                .map(msg => `${msg.role.toUpperCase()}:\n${msg.content}\n`)
                .join('\n');
            
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${modelConfigs[currentModel].name.toLowerCase().replace(/\s+/g, '-')}-conversation.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            updateStatus('Conversation exported', 'ok');
        });
    </script>
</body>
</html>
